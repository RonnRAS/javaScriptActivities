<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

        body {
            background-color: #0f1724;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1a2438;
            border: 1px solid #2a3a58;
            border-radius: 20px;
            padding: 2.5rem 3rem;
            text-align: center;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        .dice-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 0.5rem 0 1.25rem;
        }

        h1.title {
            color: #63b3ed;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        #dieFace, #dieFace2, #dieFace3 {
            font-size: 5rem;
            font-weight: 700;
            color: #e2e8f0;
            margin: 0.5rem 0 1.25rem;
            min-height: 6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 12px rgba(99, 179, 237, 0.4));
            transition: opacity 0.15s ease;
        }

        #dieFace.rolling, #dieFace2.rolling, #dieFace3.rolling {
            animation: bump 0.35s ease;
        }

        @keyframes bump {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25) rotate(-10deg); }
            70%  { transform: scale(0.9) rotate(8deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        #mainBtn {
            background: #63b3ed;
            color: #0f1724;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.75rem 2.5rem;
            transition: background 0.15s, transform 0.1s;
            width: 100%;
        }

        #mainBtn:hover  { background: #90cdf4; transform: translateY(-1px); }
        #mainBtn:active { transform: scale(0.97); }

        .range-label {
            color: #4a6080;
            font-size: 0.75rem;
            margin-top: 1rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">Dice Roller</h1>
        <div class="dice-row">
            <h3 id="dieFace">—</h3>
            <h3 id="dieFace2">—</h3>
            <h3 id="dieFace3">—</h3>
        </div>
        <button id="mainBtn" class="btn">Roll</button>
        <p class="range-label">1 – 10</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
