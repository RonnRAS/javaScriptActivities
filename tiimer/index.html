<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
        }

        #main-text {
            font-size: 6rem;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .counter-card {
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="counter-card card p-5 text-center bg-white" style="min-width: 340px;">
        <h5 class="text-muted text-uppercase letter-spacing mb-1">Counter</h5>
        <h1 id="main-text" class="display-1 my-3 text-dark">0</h1>
        <div class="d-flex gap-3 justify-content-center mt-2">
            <button id="decreaseBtn" class="btn btn-outline-danger btn-lg px-4">− Decrease</button>
            <button id="clearBtn" class="btn btn-outline-secondary btn-lg px-4">Reset</button>
            <button id="increaseBtn" class="btn btn-outline-success btn-lg px-4">+ Increase</button>
        </div>
    </div>

    <script src="index.js"></script>

</body>

</html>
