<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CHECKER</title>
</head>
<body>
    <div>
        <form action="">
            <h1>BMI CHECKER</h1>
            <p id="warningMsg"></p>
            <label for="firstName">Firsst Name :</label>
            <input type="text" id="firstName" name="firstName"><br>

            <label for="lastName">Last Name :</label>
            <input type="text" id="lastName" name="lastName"><br>

            <label for="age">Age :</label>
            <input type="number" id="age" min="1" max="100" name="age"><br>

            <label for="height">Height (Cm):</label>
            <input type="number" id="height" min="1" name="height" placeholder="CM"><br>
            

            <label for="weight">Weight (Kg):</label>
            <input type="number" id="weight" min="1" name="weight" placeholder="KG"><br>

            <button type="button" onclick="submitForm()">submit</button>
        </form>
        <div id="bmiResult">
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
