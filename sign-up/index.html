<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <style>
    
    .inputHandler .errorHandler {
        visibility: hidden;
    }
    
    </style>
</head>
<body>
    
    <form action="form" id="SignupMeth">
        <h2>Create your Account</h2>

        <div class="inputHandler">
        <label for="firstName">First Name</label>
        <input type="text" name="firstName" id="firstName"><br>
        <p id="fnameError" class="errorHandler">(error here)</p>
        </div>

        <div class="inputHandler">
        <label for="lastName">Last Name</label>
        <input type="text" name="lastName" id="lastName"><br>
        <p id="lnameError" class="errorHandler">(error here)</p>
        </div>

        <div class="inputHandler">
        <label for="email">Email</label>
        <input type="email" name="email" id="email"><br>
        <p id="emailError" class="errorHandler">(error here)</p>
        </div>

        <div class="inputHandler">
        <label for="pWord">Password</label>
        <input type="password" name="pWord" id="pWord"><br>
        <p id="pwError" class="errorHandler">(error here)</p>
        </div>

        <button type="button" onclick="createAcc()">Create Account</button>
    </form>


<script src="index.js"></script>
</body>
</html>
