<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Dice Roller</title>
    <style>
        #diceResults img { width: 72px; height: 72px; object-fit: contain; flex-shrink: 0; }
    </style>
</head>
<body class="bg-dark min-vh-100 d-flex align-items-center justify-content-center" style="font-family: 'Inter', sans-serif;">

    <div class="card bg-secondary bg-opacity-10 border-0 shadow-lg rounded-4 p-4 p-md-5 text-center" style="width: 100%; max-width: 520px;">

        <!-- Title -->
        <h1 class="fw-bold text-white mb-1">🎲 Dice Roller</h1>
        <p class="text-white mb-4">Roll as many dice as you want!</p>

        <!-- Input + Button -->
        <div class="d-flex gap-2 justify-content-center mb-4">
            <input
                type="number"
                placeholder="0"
                value="1"
                min="1"
                id="numToRoll"
                class="form-control form-control-lg rounded-3 text-center fw-bold"
                style="max-width: 100px; background:#1e293b; border-color:#334155; color:#f1f5f9;"
            >
            <button
                type="button"
                onclick="mainRoller()"
                class="btn btn-primary btn-lg rounded-3 fw-bold px-4"
            >
                Roll Dice
            </button>
        </div>

        <!-- Result label -->
        <h2 id="numResults" class="fs-6 text-info fw-semibold mb-3"></h2>

        <!-- Dice images -->
        <div id="diceResults" class="d-flex flex-row flex-nowrap gap-2 justify-content-start overflow-auto pb-2"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
