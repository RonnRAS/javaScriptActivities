<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-card {
            max-width: 420px;
            width: 100%;
        }

        #guessStatus.shake {    
            animation: shake 0.4s;      
        }
        @keyframes shake {
            0%   { transform: translateX(0); }
            20%  { transform: translateX(-8px); }
            40%  { transform: translateX(8px); }
            60%  { transform: translateX(-8px); }
            80%  { transform: translateX(8px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="card shadow game-card p-4">
        <div class="card-body text-center">
            <h1 class="card-title mb-3">🎯 Guess the Number</h1>
            <p class="text-muted mb-4" id="headTitle"></p> <!--I'm thinking of a number between $ and 100. Can you guess it?-->

            <div class="mb-3">
                <label for="userNum" class="form-label">Your Number</label>
                <input type="number" class="form-control text-center" placeholder="0" id="userNum" min="1" max="100" required>
            </div>

            <button id="guessNumSubmit" class="btn btn-primary w-100">Submit</button>

            <h2 id="guessStatus" class="mt-4 fs-5"></h2>
        </div>
    </div>

    <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'
    disable-select="false"
    ></script>
    <script src="index.js"></script>
    
</body>
</html>
