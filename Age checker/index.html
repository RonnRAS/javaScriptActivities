<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark min-vh-100 d-flex align-items-center justify-content-center">

    <div class="card bg-secondary-subtle border-secondary shadow-lg p-4" style="max-width: 400px; width: 100%;">
        <h1 class="text-primary fw-bold text-uppercase fs-6 letter-spacing mb-4">Age Checker</h1>

        <label for="userInput" class="form-label text-secondary fw-semibold text-uppercase small">Your Age</label>
        <input type="text" id="userInput" class="form-control bg-dark text-light border-secondary mb-3" placeholder="e.g. 25">

        <button id="myBtn" class="btn btn-primary w-100 fw-bold text-uppercase">Submit</button>

        <p id="resultOutput" class="text-center text-light fw-semibold mt-3 mb-0 text-primary"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="index.js"></script>
</body>
</html>
