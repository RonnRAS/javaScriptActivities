<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Conversion Program</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        #conversionMess.shake {    
            animation: shake 0.4s;      
        }
        @keyframes shake {
            0%   { transform: translateX(0); }
            20%  { transform: translateX(-8px); }
            40%  { transform: translateX(8px); }
            60%  { transform: translateX(-8px); }
            80%  { transform: translateX(8px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow-sm p-4" style="max-width: 420px; width: 100%;">
            
            
            <form>
                <h1 class="h3 mb-4 text-center">Temperature Conversion</h1>

                <div class="mb-3">
                    <label for="numBox" class="form-label">Temperature</label>
                    <input type="number" id="numBox" class="form-control" placeholder="0">
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input type="radio" name="temp" id="toFahrenheit" class="form-check-input">
                        <label for="toFahrenheit" class="form-check-label">Celsius to Fahrenheit</label>
                    </div>

                    <div class="form-check">
                        <input type="radio" name="temp" id="toCelcius" class="form-check-input">
                        <label for="toCelcius" class="form-check-label">Fahrenheit to Celsius</label>
                    </div>
                </div>

                <button type="button" id="submitBtn" onclick="convert()" class="btn btn-primary w-100">Submit</button>

                <p id="conversionMess" class="mt-3 text-center fw-semibold"></p>
            </form>
        </div>
    </div>

    <script 
    disable-devtool-auto
    disable-select = 'false'
    src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
    <script src="index.js"></script>
</body>
</html>
